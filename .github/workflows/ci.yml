name: Job Fit Agent CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_evals:
        description: 'Run eval suite (calls Anthropic API ~$0.10)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:

  # ── Job 1: Unit Tests ──────────────────────────────────────────────────────
  # Runs on every push. No API calls. Fast (~10 seconds).
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v

  # ── Job 2: Smoke Tests ─────────────────────────────────────────────────────
  # Runs on every push. Playwright browser tests, no API calls. (~15 seconds).
  smoke-tests:
    name: Playwright Smoke Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Run smoke tests
        run: pytest tests_e2e/ -v -k "smoke"

  # ── Job 3: Eval Suite ──────────────────────────────────────────────────────
  # Manual trigger only — calls Anthropic API (~$0.10, ~3 minutes).
  # Run from: GitHub Actions tab → Run workflow → set run_evals = true
  eval-suite:
    name: AI Eval Suite
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_evals == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run eval suite
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pytest evals/eval_suite.py -v

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: .pytest_cache/
          retention-days: 7

          